# v0.3 SMOKE: validate the Phase A + C + D levers all fire on a short run.
#   A (regularization): lora.dropout=0.08 in the LoRA config, label_smoothing=0.1
#      on the TRAIN loss, and early stopping armed (patience=2) so the early-stop
#      path executes on the composite metric.
#   C2 (unmask recompile caching): k0=6 + unmask_fraction=0.5 over 8 steps
#      -> K = 6,7,7,8,8,8,8,8 => transitions @ step1 (6->7) and step3 (7->8), and
#      REPEATS @ step2 (7) + step4+ (8). So we should see exactly 3 distinct
#      cb_weights graphs (K=6,7,8) compile once each, and the repeats hit the cache
#      (no recompile). Confirms the cache-by-value design.
#   C3 (depth-unfreeze): depth_unfreeze_blocks=0 = production parity (OOM at 2 on
#      v6e-8); mechanism already validated live (206M unfrozen, depth_blocks group).
#   D (multitask): val runs (val_every=4 -> steps 4 & 8) so `val/composite` is
#      computed and best_by_val + early stopping select on it; text_weight
#      curriculum (0.5->0.3 over the first 4 steps, quantised) fires with a
#      bounded number of recompiles.
#
# Usage:
#   bash scripts/tpu/launch_release.sh configs/tpu/stage2_tpu_v6e_v3_smoke.yaml

backend: tpu

data:
  encoded_dir: /mnt/data/encoded
  train_split: /mnt/data/splits/train.jsonl
  val_split: /mnt/data/splits/val.jsonl
  max_frames: 200
  audio_frame_rate: 12.5
  num_workers: 32
  pin_memory: false

train:
  weight_decay: 0.05
  num_codebooks: 8
  batch_size: 8
  grad_accum: 4
  max_steps: 8
  warmup_steps: 1
  min_lr_ratio: 0.0
  early_stop_patience: 2          # Phase A/D: arm early-stop on the composite metric
  early_stop_min_delta: 0.001
  compile_warmup_steps: 1
  enable_clip_grad_norm: false
  log_grad_norm: true
  fsdp_barrier_hook: false
  depth_chunk_size: 16
  precision: bfloat16
  use_scan_layers: false
  xla_grad_checkpoint: true
  final_canonical_save: false

loss:
  text_weight: 0.2
  audio_weight: 1.0
  text_padding_weight: 0.01
  zero_padding_weight: 0.0
  label_smoothing: 0.1
  # Phase C: unmask with k0=6 so only K=6->7->8 transitions happen (3 distinct
  # graphs) -> fast + clearly observable caching.
  per_codebook_multipliers: [1.0, 1.0, 1.5, 1.5, 2.0, 2.0, 2.0, 2.0]
  progressive_unmask_fraction: 0.5
  unmask_k0: 6
  # Phase D: curriculum ramps over the first 4 of 8 steps so it's clearly visible;
  # composite (audio-heavier) is the best_by_val + early-stop metric.
  text_weight_start: 0.5
  text_weight_end: 0.3
  text_weight_curriculum_frac: 0.5
  text_weight_quantum: 0.05
  composite_text_w: 0.4
  composite_audio_w: 0.6

lora:
  r: 16
  alpha: 32
  dropout: 0.08
  target_modules: [q_proj, v_proj, embed_tokens]
  lora_exclude_top: 2
  num_full_ft_layers: 0
  # Phase C3: 0 = production parity (lever is opt-in/off for v0.3). depth_unfreeze=2
  # OOM'd on v6e-8 (needed 28.96G > 27.87G free) -- the +205M trainable + AdamW state
  # + grad-ckpt backward exceeds HBM. Run #1 validates the unmask-caching path that
  # actually ships. C3 grad flow validated separately at reduced batch (run #2).
  depth_unfreeze_blocks: 0

optim:
  lr_lora: 1.0e-4
  lr_full_ft: 5.0e-5
  lr_projection: 5.0e-4
  lr_depth: 1.0e-4
  lr_depth_blocks: 1.0e-5
  lr_audio_embed: 5.0e-4
  lr_text_embed: 5.0e-4

logging:
  log_every: 1
  save_every: 0                   # no checkpoints for the smoke
  audio_every: 100000
  val_every: 4                    # Phase D: val at steps 4 & 8 -> composite + early-stop fire
  val_max_batches: 4
  val_on_tpu: true
  diag_metrics: true              # need [diag] gradnorm to see depth_blocks
  save_dir: gs://tinyaya-stage2-tpu/checkpoints/stage2-tpu-v6e-v3-smoke
  keep_last_n: 0
  keep_local_checkpoints: false
  use_wandb: false                # smoke: no wandb
  wandb_project: tinyaya-stage2-tpu
  wandb_run_name: v6e-v3-smoke

perf:
  enabled: true
  warmup_skip_steps: 2
  xprof_trace_labels: false
