# TPU v6e-64 BATCH SWEEP — global batch 256 arm.
#
# Tests whether a SMALL global batch (LoRA-safe per "LoRA Without Regret") on the
# full 64-chip mesh matches the large-batch arm at EQUAL DATA BUDGET. Pair config
# is stage2_tpu_v6e64_b2048.yaml. Both use the regularization-sweep WINNER
# (sz5waemu): lora_r=8/alpha=16, dropout=0.15, weight_decay=0.10.
#
# Global batch = batch_size(per-chip) x grad_accum x 64 chips = 4 x 1 x 64 = 256.
#   (VERIFY from the run log's effective-batch / [tpu_backend] global= line; the
#    multi-host world_size semantics are confirmed empirically on the first run.)
# Data budget: 2500 steps x 256 = 640k samples (~3.4 epochs of the 190k subset),
#   matched by b2048 running ~313 steps x 2048.
# Reuses the EXISTING 200k GCS subset (audio-only, val-fixed) -- no new staging.

backend: tpu

data:
  encoded_dir: /mnt/data/encoded
  train_split: /mnt/data/splits/train.jsonl
  val_split: /mnt/data/splits/val.jsonl
  max_frames: 300
  audio_frame_rate: 12.5
  num_workers: 32
  pin_memory: false

train:
  weight_decay: 0.10              # sweep winner
  num_codebooks: 8
  batch_size: 4                   # per-chip -> 4 x 1 x 64 = global 256
  grad_accum: 1
  max_steps: 2500                 # 2500 x 256 = 640k samples (equal-budget vs b2048)
  warmup_steps: 300
  min_lr_ratio: 0.0
  early_stop_patience: 0          # OFF -- run full budget for a fair batch comparison
  compile_warmup_steps: 1
  enable_clip_grad_norm: false
  log_grad_norm: true
  fsdp_barrier_hook: false
  depth_chunk_size: 16
  precision: bfloat16
  use_scan_layers: false
  xla_grad_checkpoint: true
  final_canonical_save: false

loss:
  # AUDIO-ONLY (corpus has no text alignments).
  text_weight: 0.0
  audio_weight: 1.0
  text_weight_curriculum_frac: 0.0
  composite_text_w: 0.0
  composite_audio_w: 1.0
  text_padding_weight: 0.01
  zero_padding_weight: 0.0
  label_smoothing: 0.1
  per_codebook_multipliers: [1.0, 1.0, 1.5, 1.5, 2.0, 2.0, 2.0, 2.0]
  progressive_unmask_fraction: 0.10
  unmask_k0: 1

lora:
  r: 8                            # sweep winner
  alpha: 16                       # 2 x r
  dropout: 0.15                   # sweep winner
  target_modules: [q_proj, v_proj, embed_tokens]
  lora_exclude_top: 2
  num_full_ft_layers: 0
  depth_unfreeze_blocks: 0

optim:
  lr_lora: 2.8e-4                 # sweep winner (tuned at global batch 256)
  lr_full_ft: 5.0e-5
  lr_projection: 5.0e-4
  lr_depth: 1.0e-4
  lr_depth_blocks: 1.0e-5
  lr_audio_embed: 5.0e-4
  lr_text_embed: 5.0e-4

logging:
  log_every: 25
  save_every: 0
  audio_every: 1000000
  val_every: 250
  val_max_batches: 25
  val_on_tpu: true
  diag_metrics: false
  save_dir: gs://tinyaya-stage2-tpu/checkpoints/stage2-tpu-v6e64-b256
  keep_last_n: 0
  keep_local_checkpoints: false
  use_wandb: true
  wandb_project: tinyaya-stage2-tpu
  wandb_run_name: v6e64-batch-256

perf:
  enabled: true
  warmup_skip_steps: 25
  xprof_trace_labels: false
