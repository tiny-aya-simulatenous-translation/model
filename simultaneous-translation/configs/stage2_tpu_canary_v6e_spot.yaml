# Canary config -- TPU v6e-64 SPOT in europe-west4-a or us-east1-d.
#
# WHY THIS EXISTS
# ---------------
# Final fallback in the autonomous TRC capacity tree (see
# docs/tpu-capacity-log.md section 1). v6e is the newest generation
# in the TRC grant; if neither v4 nor v5e materialise, v6e in
# us-east1-d or europe-west4-a is the last spot option.
#
# v6e has the same 32 GiB HBM/chip as v4 (vs v5e's 16 GiB), so the
# batch_size and memory tuning resembles the v4 spot config more
# than the v5e spot config.
#
# Differences vs configs/stage2_tpu_canary_v4_spot.yaml:
#   * v6e-64 is 8 hosts x 8 chips/host = 64 chips
#     (v4-32 was 4 hosts x 4 chips/host = 16 chips)
#     -> 4x more chips for data parallelism
#   * Effective batch held at 2 * 1 * 64 = 128 by trimming
#     grad_accum from 4 (v4-32) to 1 (v6e-64).
#
# Usage:
#   TRC_PROFILE=v6e-64-ue1d \
#   QR_NAME=tinyaya-stage2-spot-v6e-canary-qr \
#   NODE_ID=tinyaya-stage2-spot-v6e-canary \
#   CONFIG_FILE=configs/stage2_tpu_canary_v6e_spot.yaml \
#   TPU_STRATEGY=fsdpv2_lora \
#   PROBE_FIRST=1 \
#     bash scripts/tpu/launch_spot.sh
#
# See also: docs/tpu-trc-allocation.md  (TRC quotas)

backend: tpu

data:
  encoded_dir: /mnt/data/encoded
  train_split: /mnt/data/splits/train.jsonl
  val_split: /mnt/data/splits/val.jsonl
  max_frames: 300
  audio_frame_rate: 12.5
  num_workers: 4
  pin_memory: false

# ---------------------------------------------------------------------
# Train: v6e-64 spot retune.
# Effective batch = 2 * 1 * 64 = 128.
# ---------------------------------------------------------------------
train:
  num_codebooks: 8
  # batch=1, accum=2 matches iter 7's effective batch shape better.
  # Combined with float32 precision, this bisects the v4 vs v6e gap.
  batch_size: 1
  grad_accum: 2
  max_steps: 20
  warmup_steps: 50
  depth_chunk_size: 16
  # iter 14: bf16 with attention-mask monkey-patch (train_hierarchical.py
  # _patch_attention_mask_for_bf16 clamps mask values >= -1e4 to avoid
  # the pytorch/xla #4152 overflow). Falls back to fp32 if NaN reappears.
  precision: bfloat16

  # Same disable as the v4 canary. v6e has 32 GiB/chip like v4, so
  # the activation budget is the same; canary should compile and
  # train without checkpointing. See stage2_tpu_canary.yaml for the
  # full rationale (scan_layers _ensure_same_structure rejects our
  # mixed LoRA / FullFT layer set, is_layer_pure FakeTensor crash,
  # persistent cache deserialize broken on torch_xla 2.9).
  use_scan_layers: false
  xla_grad_checkpoint: false

  # Patch 19 (HF transformers issue #36004 fix): destructive end-of-
  # training save. Moves the entire FSDPv2-wrapped model to CPU on all
  # hosts (SPMD gather), then host-0 calls save_pretrained on the
  # now-CPU model. Avoids the deadlock that hit iters 9/10/11 inside
  # PEFT.save_pretrained on the XLA model. Disabled for iter 12 so we
  # can validate that the loop reaches step 200 first; flip to true
  # for iter 13 once the loop is healthy. iter 12 completed step 200
  # with decreasing loss -> now enabling for iter 13 save-bug validation.
  final_canonical_save: true

loss:
  text_weight: 0.1
  audio_weight: 1.0

optim:
  lr_lora: 1.5e-4
  lr_full_ft: 5.0e-5
  lr_projection: 5.0e-4
  lr_depth: 2.5e-4
  lr_audio_embed: 5.0e-4
  lr_text_embed: 5.0e-4

logging:
  log_every: 1
  # Patch 18a: save_every=0 disables the periodic save that deadlocks
  # all 4 hosts at futex_wait_queue inside PEFT.save_pretrained on
  # FSDPv2-XLA. The end-of-training canonical save (patch 19) is the
  # only save attempt; it is gated by train.final_canonical_save.
  save_every: 0
  audio_every: 100
  val_every: 100
  save_dir: gs://tinyaya-stage2-tpu/checkpoints/stage2-tpu-v6e-spot-canary
  keep_last_n: 5
  use_wandb: true
  wandb_project: tinyaya-stage2-tpu
  wandb_run_name: v6e-64-spot-canary
