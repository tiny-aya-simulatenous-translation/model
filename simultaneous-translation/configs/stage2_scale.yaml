# Stage 2 — full-scale TR↔HI speech-to-speech translation
# Mirrors tinyaya-moshi-backbone/configs/stage2.yaml; tuned for G4 ~97 GB.
data:
  train_split: /content/fleurs-tr-hi-mimi-encoded/splits/train.jsonl
  val_split:   /content/fleurs-tr-hi-mimi-encoded/splits/val.jsonl
  encoded_dir: /content/fleurs-tr-hi-mimi-encoded/encoded/encoded
  max_frames: 300              # ~24 s at 12.5 Hz; source+target combined
  audio_frame_rate: 12.5
  num_workers: 4
  pin_memory: true

train:
  num_codebooks: 8
  batch_size: 2                # micro-batch
  grad_accum: 4                # effective batch = 8
  max_steps: 5000
  warmup_steps: 500
  min_lr_ratio: 0.1
  depth_chunk_size: 16
  precision: bfloat16
  max_grad_norm: 1.0
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_eps: 1.0e-8

loss:
  text_weight: 0.1
  audio_weight: 1.0

optim:
  lr_lora:         1.5e-4      # halved from 3e-4 overfit run
  lr_full_ft:      5.0e-5
  lr_projection:   5.0e-4
  lr_depth:        2.5e-4
  lr_audio_embed:  5.0e-4
  lr_text_embed:   5.0e-4

logging:
  log_every: 20
  save_every: 1000
  audio_every: 1000
  val_every: 1000
  save_dir: checkpoints/stage2_scale
  wandb_project: tinyaya-s2s
  wandb_run_name: stage2_scale_9k
  use_wandb: true
  push_to_hub: true
  hub_repo_id: tiny-aya-translate/tinyaya-stage2-scale
